name: Full CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DOTNET_VERSION: '8.0.x'

jobs:

# 🔹 STAGE 1: QUALITY GATE
  quality:
    name: Build + Test + Security
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Run Tests
      run: dotnet test --no-build --verbosity normal

    - name: Code Format Check
      run: dotnet format --verify-no-changes

    - name: Check Vulnerabilities
      run: dotnet list package --vulnerable

    - name: Fail on High/Critical Vulnerabilities
      run: |
        if dotnet list package --vulnerable | grep -q "Critical\|High"; then
          echo "❌ Vulnerabilities found!"
          exit 1
        fi


# 🔹 STAGE 2: DEPLOY BACKEND
  deploy-backend:
    name: Deploy Backend to Azure
    runs-on: ubuntu-latest
    needs: quality   # ⬅️ depends on Stage 1
    if: github.event_name == 'push'   # ⬅️ only after merge

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Publish API
      run: dotnet publish ./LibraryAPI/LibraryAPI.csproj -c Release -o ./publish-api

    - name: Deploy API
      uses: azure/webapps-deploy@v2
      with:
        app-name: library-api-app
        publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
        package: ./publish-api


# 🔹 STAGE 3: DEPLOY FRONTEND
  deploy-frontend:
    name: Deploy Frontend to Azure
    runs-on: ubuntu-latest
    needs: deploy-backend   # ⬅️ depends on backend deploy
    if: github.event_name == 'push'

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Publish Blazor
      run: dotnet publish ./LibraryBlazorApp/LibraryBlazorApp.csproj -c Release -o ./publish-blazor

    - name: Deploy Blazor
      uses: azure/webapps-deploy@v2
      with:
        app-name: library-blazor-app
        publish-profile: ${{ secrets.AZURE_BLAZOR_PUBLISH_PROFILE }}
        package: ./publish-blazor
